{% extends "base.html" %}

{% block title %}Error - Deyor{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-8">
  <div class="container mx-auto px-4 max-w-2xl">
    <div class="bg-white rounded-xl shadow-lg border border-gray-200 p-8 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-4">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Oops!</h1>
      <p class="text-gray-600 mb-6">{{ message }}</p>
      <div class="text-sm text-gray-500">
        <div class="mt-6 text-sm text-gray-500">
          <p>Need help? Contact us at <a href="mailto:care@deyor.in" class="text-rose-500 hover:text-rose-600 font-medium">care@deyor.in</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
